name: Close inactive issues
on:
  schedule:
    - cron: "30 1 * * *"

jobs:
  close-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v10
        with:
          days-before-issue-stale: 30
          days-before-issue-close: 14
          stale-issue-label: "stale"
          stale-issue-message: "Dieses Issue ist veraltet, da es seit 30 Tagen ohne Aktivität offen ist."
          close-issue-message: "Dieses Issue wurde geschlossen, da es seit 14 Tagen nach der Markierung als veraltet inaktiv war."
          days-before-pr-stale: -1
          days-before-pr-close: -1
          repo-token: ${{ secrets.GITHUB_TOKEN }}
